{% extends 'base.html' %}
{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: auto; text-align: center;">
    <h2 id="form-title">Login</h2>
    <form method="POST">
        <input type="hidden" name="action" id="action-type" value="login">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" id="submit-btn">Login</button>
    </form>
    <p style="margin-top: 15px; cursor: pointer; text-decoration: underline;" onclick="toggleForm()">
        Need an account? Sign up
    </p>
</div>
{% endblock %}
